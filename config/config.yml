app:
  name: JARVIS
  version: 2.0.0
  debug: true

ollama:
  model: llama3.2
  timeout: 120

voice:
  enabled: true
  wake_word: jarvis
  microphone_index: 1
  speaker_index: 3
  sample_rate: 16000
  channels: 1

speech_to_text:
  model: "models/whisper"
  device: "cpu"
  compute_type: "int8"
  language: "en"
  beam_size: 5

text_to_speech:
  engine: piper
  piper_path: "C:/AI/piper/piper.exe"
  voice: "C:/AI/piper/voices/en_US-lessac-medium.onnx"
  output: "jarvis_output.wav"

research:
  provider: ddgs

memory:
  enabled: true

desktop:
  enabled: false

browser:
  enabled: false

trading:
  enabled: false